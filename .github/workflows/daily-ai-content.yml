name: Auto AI Content Generation

on:
  schedule:
    # Günde iki kere çalışır (UTC: 08:35, 14:35 → Türkiye: 11:35, 17:35 - Gecikmeleri telafi etmek için erken ve yoğun olmayan dakikada tetiklenir)
    - cron: '35 8,14 * * *'
  workflow_dispatch: # GitHub arayüzünden el ile tetikleme butonu

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      content_changed: ${{ steps.commit.outputs.content_changed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate AI Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node scripts/generate-daily.mjs

      - name: Commit and Push changes
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/dailyContent.ts public/sitemap.xml
          if [ -d "public/images/news" ]; then git add public/images/news/; fi
          if git diff --staged --quiet; then
            echo "[CI] Değişiklik yok, deploy atlanıyor."
            echo "content_changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: AI generated daily content update"
            git push
            echo "content_changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: generate
    if: needs.generate.outputs.content_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (latest with new content)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
